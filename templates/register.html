{% extends "base.html" %}

{% block title %}Cadastro - Gordin Lanches{% endblock %}

{% block content %}
<div class="auth-container">
    <h2 style="text-align: center; margin-bottom: 2rem;">Criar Conta</h2>
    <form method="POST">
        <div class="form-group">
            <label>Nome de Usuário</label>
            <input type="text" name="username" class="form-input" required placeholder="Como quer ser chamado?">
        </div>
        <div class="form-group">
            <label>Email</label>
            <input type="email" name="email" class="form-input" required placeholder="seu@email.com">
        </div>
        <div class="form-group">
            <label>Senha</label>
            <input type="password" name="password" class="form-input" required placeholder="Crie uma senha forte">
        </div>
        <button type="submit" class="btn btn-primary" style="width: 100%;">Cadastrar</button>
    </form>
    <p style="text-align: center; margin-top: 1.5rem; font-size: 0.9rem;">
        Já tem uma conta? <a href="{{ url_for('login') }}" style="color: var(--primary); font-weight: bold;">Entre aqui</a>
    </p>
</div>
{% endblock %}
