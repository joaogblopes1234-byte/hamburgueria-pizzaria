{% extends "base.html" %}

{% block title %}Meu Carrinho - Gordin Lanches{% endblock %}

{% block content %}
<div class="container" style="margin-top: 2rem; max-width: 900px;">
    <h1 class="section-title">Meu Carrinho</h1>
    
    <div id="cart-items">
        <!-- Rendered by JS -->
    </div>

    <div id="cart-summary" style="display: none; background: white; padding: clamp(1rem, 5vw, 2.5rem); border-radius: 20px; box-shadow: var(--shadow); margin-bottom: 4rem;">
        <h3 style="margin-bottom: 1.5rem; border-bottom: 2px solid var(--light); padding-bottom: 0.5rem; font-size: clamp(1.1rem, 4vw, 1.5rem);">Resumo do Pedido</h3>
        
        <div style="margin-bottom: 2rem; display: flex; flex-direction: column; gap: 1rem;">
            <div style="background: #fff8e1; padding: 1rem; border-radius: 10px; border-left: 4px solid var(--secondary);">
                <p style="margin: 0; font-size: 0.85rem; color: #856404;"><i class="fas fa-info-circle"></i> Finalize seu pedido preenchendo os dados abaixo para o WhatsApp.</p>
            </div>
            <div class="form-group" style="margin: 0;">
                <label for="customer_name">Seu Nome</label>
                <input type="text" id="customer_name" class="form-input" placeholder="Como devemos te chamar?" value="{{ current_user.username if current_user.is_authenticated else '' }}">
            </div>
            <div class="form-group" style="margin: 0;">
                <label for="customer_phone">Seu WhatsApp</label>
                <input type="text" id="customer_phone" class="form-input" placeholder="(00) 00000-0000" value="{{ current_user.phone if (current_user.is_authenticated and current_user.phone) else '' }}">
            </div>

            <div class="form-group" style="margin: 0;">
                <label for="neighborhood">Bairro</label>
                <select id="neighborhood" class="form-input" style="cursor: pointer; appearance: auto;">
                    <option value="" data-id="" data-fee="0">Selecione seu bairro...</option>
                    {% for n in neighborhoods %}
                    <option value="{{ n.name }}" data-id="{{ n.id }}" data-fee="{{ n.delivery_fee }}">{{ n.name }} — Taxa: R$ {{ "%.2f"|format(n.delivery_fee) }}</option>
                    {% endfor %}
                </select>
                <small id="neighborhood-status" style="display: block; margin-top: 5px; color: #ff5252; font-size: 0.75rem; min-height: 1.2em;"></small>
            </div>

            <div style="display: grid; grid-template-columns: 2fr 1fr; gap: 1rem;">
                <div class="form-group" style="margin: 0;">
                    <label for="street">Rua</label>
                    <input type="text" id="street" class="form-input" placeholder="Ex: Rua São Paulo">
                </div>
                <div class="form-group" style="margin: 0;">
                    <label for="number">Nº</label>
                    <input type="text" id="number" class="form-input" placeholder="123">
                </div>
            </div>
            
            <div class="form-group" style="margin: 0;">
                <label for="complement">Referência / Apto (Opcional)</label>
                <input type="text" id="complement" class="form-input" placeholder="Ex: Próximo à padaria">
            </div>
        </div>

        <div style="display: flex; flex-direction: column; gap: 0.8rem; margin-bottom: 2rem;">
            <div style="display: flex; justify-content: space-between;">
                <span>Subtotal:</span>
                <span id="subtotal">R$ 0.00</span>
            </div>
            <div style="display: flex; justify-content: space-between;">
                <span>Taxa de Entrega:</span>
                <span id="delivery-fee">R$ 0.00</span>
            </div>
            <div style="display: flex; justify-content: space-between; font-size: 1.5rem; font-weight: 800; color: var(--primary); margin-top: 1rem; border-top: 2px solid var(--light); padding-top: 1rem;">
                <span>TOTAL:</span>
                <span id="total">R$ 0.00</span>
            </div>
        </div>

        <button onclick="checkout()" class="btn btn-primary" style="width: 100%; font-size: 1.2rem;">Finalizar no WhatsApp <i class="fab fa-whatsapp"></i></button>
    </div>
</div>

</div>
{% endblock %}
